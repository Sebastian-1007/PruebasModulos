<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Aspirante</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* General */
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Contenedor principal */
.login-wrapper {
    display: flex;
    max-width: 900px;
    width: 100%;
    height: 500px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    background: #fff;
}

/* Carrusel izquierdo */
.carousel {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #e5e6eb 0%, #f3f3f5 100%);
}

.carousel img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    opacity: 0;
    animation: slide 15s infinite;
    border-radius: 0;
}

.carousel img:nth-child(1) { 
    animation-delay: 0s; 
}
.carousel img:nth-child(2) { 
    animation-delay: 5s; 
}
.carousel img:nth-child(3) { 
    animation-delay: 10s; 
}

@keyframes slide {
    0% { opacity: 0; transform: scale(1.1); }
    5% { opacity: 1; transform: scale(1); }
    33% { opacity: 1; transform: scale(1); }
    38% { opacity: 0; transform: scale(0.95); }
    100% { opacity: 0; transform: scale(1.1); }
}

/* Formulario derecho */
.login-card {
    flex: 1;
    padding: 40px 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #fff;
    position: relative;
}

/* Avatar */
.avatar-container {
    margin-bottom: 20px;
    position: relative;
}

.avatar-circle {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #fbfbfc, #e1dee4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 4px solid #fff;
    box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
}

.avatar-circle i {
    font-size: 40px;
    color: rgb(43, 72, 238);
}

.avatar-badge {
    position: absolute;
    bottom: 0;
    right: 0;
    background: #4CAF50;
    color: white;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    border: 3px solid white;
}

.login-card h2 {
    margin-bottom: 30px;
    color: #2d3748;
    font-weight: 700;
    font-size: 1.8rem;
    background: linear-gradient(135deg, #667eea, #314df1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.login-card form {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.input-group {
    position: relative;
    width: 100%;
}

.input-icon {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #a0aec0;
    font-size: 1rem;
    transition: all 0.3s ease;
    z-index: 1;
}

.login-card input {
    width: 100%;
    padding: 14px 15px 14px 45px;
    border-radius: 12px;
    border: 2px solid #e2e8f0;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    background: #f7fafc;
    box-sizing: border-box;
}

.login-card input:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    outline: none;
    background: #fff;
}

.login-card input:focus + .input-icon {
    color: #667eea;
}

.login-card input::placeholder {
    color: #a0aec0;
    font-size: 0.95rem;
}

.login-card button {
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #4993f5, #267ef1);
    color: #fff;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.login-card button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
}

.login-card button i {
    margin-right: 8px;
}

/* Botón volver */
.back-button {
    margin-top: 25px;
    background: #f7fafc;
    color: #4a5568;
    border: 2px solid #e2e8f0 !important;
    padding: 12px 30px !important;
    border-radius: 12px !important;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.3s ease;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.back-button:hover {
    background: #edf2f7;
    color: #2d3748;
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.back-button i {
    margin-right: 8px;
}

/* Links adicionales */
.login-footer {
    margin-top: 20px;
    text-align: center;
    width: 100%;
}

.login-footer a {
    color: #718096;
    text-decoration: none;
    font-size: 0.9rem;
    transition: all 0.3s ease;
}

.login-footer a:hover {
    color: #667eea;
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 768px){
    .login-wrapper {
        flex-direction: column;
        height: auto;
        max-width: 400px;
        margin: 20px;
    }
    .carousel {
        height: 200px;
    }
    .login-card {
        padding: 30px 20px;
    }
}
</style>
</head>
<body>
<div class="login-wrapper">
    <!-- Carrusel con imágenes de estudiantes -->
    <div class="carousel">
        <img src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Estudiantes en clase">
        <img src="https://images.unsplash.com/photo-1541339907198-e08756dedf3f?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Campus universitario">
         <img src="https://images.unsplash.com/photo-1524178232363-1fb2b075b655?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="Estudiantes en clase">
    </div>

    <!-- Card login -->
    <div class="login-card">
        <!-- Avatar -->
        <div class="avatar-container">
            <div class="avatar-circle">
                <i class="fa-solid fa-user-graduate"></i>
            </div>
            <div class="avatar-badge">
                <i class="fa-solid fa-check"></i>
            </div>
        </div>

        <h2>Bienvenido</h2>

        
        <form method="POST">
            <div class="input-group">
                <i class="fa-solid fa-envelope input-icon"></i>
                <input type="email" name="correo" placeholder="Correo electrónico" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Contraseña" required>
            </div>
            
            <button type="submit">
                <i class="fa-solid fa-right-to-bracket"></i> 
                Iniciar Sesión
            </button>
        </form>

        <a href="/" class="back-button" style="text-decoration:none; display:inline-block; padding:10px 20px; border-radius:50px; text-align:center;">
            <i class="fa-solid fa-arrow-left"></i> Volver al registro
        </a>
    </div>
</div>
</body>
</html>
