<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Aspirante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Header más pequeño y elegante -->
    <div class="header-minimal">
        <div class="header-content">
            <i class="fa-solid fa-graduation-cap"></i>
            <h1>Registro de aspirantes</h1>
            <p>Periodo de pre inscripcion</p>
        </div>
    </div>

    <div class="container-compact">
        <!-- Mensajes flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{category}} alert-dismissible fade show" role="alert">
            <i class="fa-solid fa-circle-info me-2"></i>{{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- Tarjeta compacta -->
        <div class="card-compact">
            <!-- Avatar -->
            <div class="avatar-mini">
                <div class="avatar-circle-mini" id="avatarPreview">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>

            <form id="formRegistro" method="POST" enctype="multipart/form-data" novalidate>
                <div class="row g-2">
                    <!-- Nombres y apellidos -->
                    <div class="col-md-4">
                        <div class="input-group-compact">
                            <i class="fa-solid fa-user-tag input-icon-mini"></i>
                            <input type="text" class="form-control form-control-sm" name="paterno" placeholder="paterno" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group-compact">
                            <i class="fa-solid fa-user-tag input-icon-mini"></i>
                            <input type="text" class="form-control form-control-sm" name="materno" placeholder="materno" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group-compact">
                            <i class="fa-solid fa-user input-icon-mini"></i>
                            <input type="text" class="form-control form-control-sm" name="nombre" placeholder="Nombre(s)" required>
                        </div>
                    </div>

                    <!-- Correos -->
                    <div class="col-md-6">
                        <div class="input-group-compact">
                            <i class="fa-solid fa-envelope input-icon-mini"></i>
                            <input type="email" class="form-control form-control-sm" name="correo" placeholder="Correo electrónico" required>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group-compact">
                            <i class="fa-solid fa-check-double input-icon-mini"></i>
                            <input type="email" class="form-control form-control-sm" name="correo_confirm" placeholder="Confirmar correo" required>
                        </div>
                    </div>

                    <!-- Fecha, Sexo, Programa -->
                    <div class="col-md-4">
                        <div class="input-group-compact">
                            <i class="fa-solid fa-calendar input-icon-mini"></i>
                            <input type="date" class="form-control form-control-sm" name="fecha" required>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group-compact">
                            <i class="fa-solid fa-venus-mars input-icon-mini"></i>
                            <select class="form-select form-select-sm" name="sexo" required>
                                <option value="" selected disabled>Genero</option>
                                <option value="Masculino">Masculino</option>
                                <option value="Femenino">Femenino</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group-compact">
                            <i class="fa-solid fa-graduation-cap input-icon-mini"></i>
                            <select class="form-select form-select-sm" name="programa" required>
                                <option value="" selected disabled>Programa a Estudiar</option>
                                <option value="Ingeniería en Sistemas">Ingenieria N</option>
                                <option value="Licenciatura en Administración">Ingenieria N</option>
                                <option value="Medicina">Licenciatura</option>
                                <option value="Derecho">Licenciatura</option>
                            </select>
                        </div>
                    </div>

                    <!-- CURP -->
                    <div class="col-12">
                        <div class="input-group-compact">
                            <i class="fa-solid fa-qrcode input-icon-mini"></i>
                            <input type="text" class="form-control form-control-sm" name="curp" maxlength="18" placeholder="CURP (18 caracteres)" required>
                        </div>
                    </div>

                    <!-- Foto compacta -->
                    <div class="col-12">
                        <div class="photo-mini-section">
                            <div class="photo-preview-mini">
                                <img id="previewFoto" src="#" alt="Preview" class="photo-preview-img">
                                <div class="photo-preview-placeholder-mini" id="placeholderPreview">
                                    <i class="fa-solid fa-camera"></i>
                                </div>
                            </div>
                            <div class="photo-controls-mini">
                                <div class="file-input-mini">
                                    <input type="file" class="file-input-hidden" name="foto" accept="image/*" id="fotoInput">
                                    <button type="button" class="btn btn-outline-primary btn-sm" onclick="document.getElementById('fotoInput').click()">
                                        <i class="fa-solid fa-cloud-arrow-up"></i> Subir
                                    </button>
                                </div>
                                <button type="button" class="btn btn-primary btn-sm" id="btnTomarFoto">
                                    <i class="fa-solid fa-camera"></i> Tomar
                                </button>
                            </div>
                        </div>
                        <span class="file-name-mini" id="fileName">Ningún archivo seleccionado</span>
                    </div>

                    <!-- Botones -->
                    <div class="col-12 mt-3">
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill">
                                <i class="fa-solid fa-file-circle-plus"></i> Generar
                            </button>
                            <a href="/login" class="btn btn-outline-primary flex-fill">
                                <i class="fa-solid fa-right-to-bracket"></i> Iniciar
                            </a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
