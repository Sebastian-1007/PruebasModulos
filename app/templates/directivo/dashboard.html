<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Directivo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            border: 5px solid #fff;
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.4);
        }

        .avatar i {
            font-size: 60px;
            color: white;
        }

        h1 {
            color: #2d3748;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .role-badge {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 8px 25px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .info-container {
            background: #f7fafc;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-item i {
            width: 30px;
            color: #f39c12;
            font-size: 1.2rem;
        }

        .info-item .label {
            color: #718096;
            width: 120px;
            font-weight: 500;
        }

        .info-item .value {
            color: #2d3748;
            font-weight: 600;
            flex: 1;
        }

        .btn-logout {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(229, 62, 62, 0.4);
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(229, 62, 62, 0.5);
        }

        .btn-logout i {
            margin-right: 10px;
        }

        .welcome-message {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <div class="avatar">
            <i class="fas fa-user-tie"></i>
        </div>
        
        <h1>¡Bienvenido!</h1>
        <div class="role-badge">
            <i class="fas fa-briefcase"></i> Directivo
        </div>
        
        <p class="welcome-message">
            Has iniciado sesión como personal directivo
        </p>
        
        <div class="info-container">
            <div class="info-item">
                <i class="fas fa-user"></i>
                <span class="label">Nombre:</span>
                <span class="value">{{ current_user.get_nombre_completo() }}</span>
            </div>
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span class="label">Correo:</span>
                <span class="value">{{ current_user.correo }}</span>
            </div>
            <div class="info-item">
                <i class="fas fa-briefcase"></i>
                <span class="label">Puesto:</span>
                <span class="value">{{ current_user.get_detalle_rol() }}</span>
            </div>
            <div class="info-item">
                <i class="fas fa-calendar"></i>
                <span class="label">Miembro desde:</span>
                <span class="value">{{ current_user.created_at.strftime('%d/%m/%Y') }}</span>
            </div>
        </div>

        <a href="{{ url_for('auth.logout') }}" class="btn-logout">
            <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
        </a>
    </div>
</body>
</html>
